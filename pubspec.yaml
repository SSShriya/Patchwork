name: drp
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter
  supabase_flutter: ^2.0.0
  flutter_dotenv: ^5.2.1
  smooth_page_indicator: ^2.0.1
  bulleted_list: ^0.0.1+0.1a
  intl: ^0.20.2
  flutter_profile_picture: ^2.0.0
  image_picker: ^1.2.2
  flutter_secure_storage: ^9.0.0
  app_links: ^6.0.0
  shared_preferences: ^2.5.5
  flutter_map: ^8.3.0
  latlong2: ^0.9.1
  image: ^4.9.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets: 
    - .env
  fonts:
    - family: Montserrat
      fonts:
        - asset: assets/fonts/Montserrat-Regular.ttf
        - asset: assets/fonts/Montserrat-Bold.ttf
          weight: 700

    - family: Lora
      fonts:
        - asset: assets/fonts/Lora-Regular.ttf
        - asset: assets/fonts/Lora-Bold.ttf
          weight: 700

    - family: Bitter
      fonts:
        - asset: assets/fonts/Bitter-Regular.ttf
    
    - family: Merriweather
      fonts:
        - asset: assets/fonts/Merriweather_24pt-Regular.ttf