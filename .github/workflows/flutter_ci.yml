  # Put in Github releases
  release:
    needs: [build_android]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    # Create .env file
    - name: Create .env file
      run: |
        echo "SUPABASE_URL=${{ secrets.SUPABASE_URL }}" >> .env
        echo "SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}" >> .env

    # Download the artifacts from previous jobs
    - name: Download Android Artifact
      uses: actions/download-artifact@v4
      with:
        name: android-debug-apk
        path: artifacts/android

    # Create a GitHub Release with both files attached
    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: build-${{ github.run_number }}   
        name: "Debug Build #${{ github.run_number }}"
        body: |
          Automated debug build from commit ${{ github.sha }}
  
        files: |
          artifacts/android/app-debug.apk
        prerelease: true                          
                                                    
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}