name: Flutter CI/CD

# Run pipeline on pushes to any branch or pull requests to main
on:
  push:
    branches: 
        - '*'
  pull_request:
    branches: 
        - main

env:
  FLUTTER_CHANNEL: 'stable'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  # TESTING AND ANALYSING - runs on every push
  lint: 
    runs-on: ubuntu-latest
    steps:
    # Checkout the code
    - name: Checkout code
      uses: actions/checkout@v4

    # Create .env file
    - name: Create .env file
      run: |
        echo "SUPABASE_URL=${{ secrets.SUPABASE_URL }}" >> .env
        echo "SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}" >> .env

    # Set up the Java environment 
    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    # Set up Flutter
    - name: Set up Flutter
      uses: subosito/flutter-action@v2
      with:
        channel: ${{ env.FLUTTER_CHANNEL }}
        cache: true 
        pub-cache: true
    
    # Cache pub packages
    - name: Cache pub dependencies       
      uses: actions/cache@v4
      with:
          path: |
            ~/.pub-cache
            .dart_tool
          key: pub-${{ runner.os }}-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: pub-${{ runner.os }}-

    # Install dependencies
    - name: Install Dependencies
      run: flutter pub get

    # Format code
    - name: Run Linter
      run: flutter analyze

  test: 
    runs-on: ubuntu-latest
    steps:
    # Checkout the code
    - name: Checkout code
      uses: actions/checkout@v4

    # Create .env file
    - name: Create .env file
      run: |
        echo "SUPABASE_URL=${{ secrets.SUPABASE_URL }}" >> .env
        echo "SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}" >> .env

    # Set up the Java environment 
    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    # Set up Flutter
    - name: Set up Flutter
      uses: subosito/flutter-action@v2
      with:
        channel: ${{ env.FLUTTER_CHANNEL }}
        cache: true 
        pub-cache: true
    
    # Cache pub packages
    - name: Cache pub dependencies       
      uses: actions/cache@v4
      with:
          path: |
            ~/.pub-cache
            .dart_tool
          key: pub-${{ runner.os }}-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: pub-${{ runner.os }}-

    # Install dependencies
    - name: Install Dependencies
      run: flutter pub get

    # Run Tests
    - name: Run Tests
      run: flutter test

  # BUILD JOB FOR ANDROID - only runs on main branch
  build_android:
    needs: [lint, test]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
    # Checkout the code
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: false
    
    # Create .env file
    - name: Create .env file
      run: |
        echo "SUPABASE_URL=${{ secrets.SUPABASE_URL }}" >> .env
        echo "SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}" >> .env

    # Set up the Java environment 
    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    # Set up Flutter
    - name: Set up Flutter
      uses: subosito/flutter-action@v2
      with:
        channel: ${{ env.FLUTTER_CHANNEL }}
        cache: true 
        pub-cache: true

    # Reuse cached packages
    - name: Cache pub dependencies        
      uses: actions/cache@v4
      with:
          path: |
            ~/.pub-cache
            .dart_tool
          key: pub-${{ runner.os }}-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: pub-${{ runner.os }}-

    # Cache gradle
    - name: Cache Gradle                  
      uses: actions/cache@v4
      with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

    # Cache CMake
    - name: Cache CMake only
      uses: actions/cache@v4
      with:
        path: /usr/local/lib/android/sdk/cmake/3.22.1   
        key: cmake-${{ runner.os }}-3.22.1

    # Install dependencies
    - name: Install Dependencies
      run: flutter pub get

      # Restore consistent debug keystore so signature never changes between builds
    - name: Restore debug keystore
      run: |
        mkdir -p ~/.android
        echo "${{ secrets.DEBUG_KEYSTORE_BASE64 }}" | base64 --decode > ~/.android/debug.keystore

    # Verify keystore is valid
    - name: Verify keystore
      run: |
        keytool -list -keystore ~/.android/debug.keystore \
          -storepass android \
          -alias androiddebugkey

    # Build the APK
    - name: Build APK
      run: flutter build apk --debug
      env:
        ORG_GRADLE_PROJECT_storeFile: /home/runner/.android/debug.keystore
        ORG_GRADLE_PROJECT_storePassword: android
        ORG_GRADLE_PROJECT_keyAlias: androiddebugkey
        ORG_GRADLE_PROJECT_keyPassword: android

    # Upload APK artifact     
    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: android-debug-apk
        path: build/app/outputs/flutter-apk/app-debug.apk
        retention-days: 7

