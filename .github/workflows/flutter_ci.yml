name: Flutter CI/CD

# Run pipeline on pushes to any branch or pull requests to main
on:
  push:
    branches: 
        - '*'
  pull_request:
    branches: 
        - main

jobs:
  build:
    runs-on: ubuntu-latest
    env:
        FLUTTER_CHANNEL: 'stable'

    steps:
    # Checkout the code
    - name: Checkout code
      uses: actions/checkout@v4

    # Set up the Java environment 
    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    # Set up Flutter
    - name: Set up Flutter
      uses: subosito/flutter-action@v2
      with:
        channel: ${{ env.FLUTTER_CHANNEL }}
        cache: true 
        pub-cache: true

    # Install dependencies
    - name: Install Dependencies
      run: flutter pub get

    # Format code
    - name: Run Linter
      run: flutter analyze

    # Run Tests
    - name: Run Tests
      run: flutter test

    # Build the APK if in the main branch
    - name: Build APK
      if: github.ref == 'refs/heads/main'
      run: flutter build apk --debug